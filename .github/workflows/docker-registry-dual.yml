name: Build and Push Multi-Arch

on:
  push:
    branches: [ main, mario ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version
        id: version
        run: echo "VERSION=$(grep '^version' build.gradle.kts | sed -E 's/version *= *\"(.*)\"/\1/')" >> $GITHUB_OUTPUT

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew bootJar -x test

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ github.ref_name == 'mario' && format('christiand9699/sensor-manager-mario:mario,christiand9699/sensor-manager-mario:mario-{0}', steps.version.outputs.VERSION) || '' }}
            ${{ github.ref_name == 'main' && format('christiand9699/sensor-manager:latest,christiand9699/sensor-manager:main,christiand9699/sensor-manager:{0}', steps.version.outputs.VERSION) || '' }}